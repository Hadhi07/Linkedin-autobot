<style>
    .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

        background-color: #0e0e0e;
        color: #e5e2e1;

        min-height: max(884px, 100dvh);
    }

<body class="min-h-screen flex flex-col items-center justify-center relative p-6">
<div class="fixed top-0 right-0 -z-10 w-1/2 h-full opacity-10 pointer-events-none">
<div class="absolute inset-0 bg-gradient-to-l from-primary-container/20 to-transparent"></div>
<img class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDXNvJCO4Dvry3Y_ABfG_WijQ_DiQEo9Jfq3MIWpc_HepLo4-dD1trvCNqhOD4oCqs573tvDVt629a3Aq17O0f12bUTh39gtSRT6LEIxEjX5tnaOWFqO9zcK4Z261WWFkvPophZpDDgMz7PLrlzI4Shfu2DAhQ5QJkTEhoelbeYSPOUndyLBUvrGhpw1UdLkMTsA_fYa5Vw-XFNBW1kfgkgdEOllptapO0XgbWBxPH-4CMQAdQa8evcBHSPdFyml-5wbOLDXElQGZRq"/>
</div>

<div class="w-full max-w-md space-y-8 bg-[#131313]/90 backdrop-blur-md p-10 rounded-2xl border border-outline-variant/20 shadow-2xl">
    <div class="text-center">
        <h2 class="font-headline text-4xl text-white mb-2">Welcome</h2>
        <p class="text-on-surface-variant">Log in to your AI Architect session</p>
    </div>
    
    <div class="space-y-6">
        <div class="space-y-2">
            <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider ml-1">Full Name</label>
            <input class="w-full bg-surface-container-lowest border border-outline-variant/10 focus:border-primary-fixed-dim focus:ring-1 focus:ring-primary-fixed-dim/20 rounded-lg py-4 px-5 text-on-surface transition-all outline-none" placeholder="Enter your full name" type="text" id="loginName"/>
        </div>
        <div class="space-y-2">
            <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider ml-1">Phone / WhatsApp</label>
            <input class="w-full bg-surface-container-lowest border border-outline-variant/10 focus:border-primary-fixed-dim focus:ring-1 focus:ring-primary-fixed-dim/20 rounded-lg py-4 px-5 text-on-surface transition-all outline-none" placeholder="e.g. +1 234 567 8900" type="text" id="loginPhone"/>
        </div>
        <button onclick="saveLoginAndProceed()" class="group w-full bg-primary-container text-on-primary py-4 px-8 rounded-lg font-bold text-lg flex items-center justify-center gap-3 shadow-[0_20px_40px_-12px_rgba(0,255,136,0.3)] hover:glow-[#00e479]/20 transition-all duration-300 mt-4">
            Login
            <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">login</span>
        </button>
    </div>
</div>
<script>
    function saveLoginAndProceed() {
        const name = document.getElementById('loginName').value;
        const phone = document.getElementById('loginPhone').value;
        if (!name || !phone) {
            alert('Please enter your name and phone number to continue.');
            return;
        }
        const data = JSON.parse(localStorage.getItem('onboarding_data') || '{}');
        data.name = name;
        data.phone = phone;
        localStorage.setItem('onboarding_data', JSON.stringify(data));
        window.location.href = 'step1.html';
    }
</script>
</body>
</html>
