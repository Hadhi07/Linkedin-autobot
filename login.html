<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Authenticate - High-Ticket AI Intelligence</title>
<link href="./input.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@700;800&amp;family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    body {
        background-color: #0e0e0e;
        color: #e5e2e1;
        font-family: 'Manrope', sans-serif;
        min-height: max(884px, 100dvh);
    }
    input:-webkit-autofill,
    input:-webkit-autofill:hover, 
    input:-webkit-autofill:focus, 
    input:-webkit-autofill:active{
        -webkit-box-shadow: 0 0 0 30px #1a1a1a inset !important;
        -webkit-text-fill-color: white !important;
        transition: background-color 5000s ease-in-out 0s;
    }
</style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center relative p-6 overflow-hidden">
<div class="fixed top-0 right-0 -z-10 w-full h-full opacity-20 pointer-events-none">
    <div class="absolute inset-0 bg-gradient-to-tr from-black via-transparent to-primary-container/30"></div>
    <div class="absolute -bottom-40 -left-40 w-96 h-96 bg-primary-container/20 rounded-full blur-[120px]"></div>
    <div class="absolute top-20 right-20 w-80 h-80 bg-primary-container/10 rounded-full blur-[100px]"></div>
</div>

<main class="w-full max-w-[420px] bg-[#111111]/80 backdrop-blur-2xl rounded-[2.5rem] p-10 shadow-[0_30px_60px_-15px_rgba(0,0,0,0.8),0_0_80px_rgba(0,255,136,0.07)] border border-white/5 relative z-10 transform scale-100 animate-fade-in transition-all">
    
    <!-- Header -->
    <div class="text-center mb-10">
        <div class="mx-auto w-16 h-16 bg-gradient-to-br from-primary-container to-secondary-container rounded-3xl flex items-center justify-center mb-6 shadow-[0_0_40px_rgba(0,255,136,0.3)]">
            <span class="material-symbols-outlined text-black text-3xl">fingerprint</span>
        </div>
        <h1 class="text-3xl font-extrabold font-headline bg-gradient-to-br from-white to-[#a0a0a0] bg-clip-text text-transparent transform tracking-tight">Welcome to Onboarding</h1>
        <p class="text-on-surface-variant mt-3 text-sm font-medium tracking-wide">Sign Up to start your onboarding process.</p>
    </div>

    <!-- Form -->
    <form id="loginForm" class="space-y-6">
        <div class="space-y-2">
            <label class="text-xs uppercase tracking-widest text-[#a0a0a0] font-bold ml-2">Full Name</label>
            <div class="relative group">
                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-[#a0a0a0] group-focus-within:text-primary-container transition-colors">person</span>
                <input id="userName" required class="w-full bg-[#1a1a1a] border border-white/5 rounded-2xl py-4 pl-12 pr-4 text-white placeholder-[#555] focus:outline-none focus:border-primary-container/50 focus:ring-1 focus:ring-primary-container/50 transition-all font-medium" placeholder="Enter your full name" type="text"/>
            </div>
        </div>

        <div class="space-y-2">
            <label class="text-xs uppercase tracking-widest text-[#a0a0a0] font-bold ml-2">WhatsApp Number</label>
            <div class="flex gap-3">
                <div class="relative bg-[#1a1a1a] border border-white/5 rounded-2xl flex items-center px-4 w-[110px] shrink-0 focus-within:border-primary-container/50 focus-within:ring-1 focus-within:ring-primary-container/50 transition-all cursor-pointer">
                    <span class="text-xl mr-2" id="flagIcon">🇮🇳</span>
                    <span class="text-white font-medium" id="codeText">+91</span>
                    <select id="countryCode" class="absolute inset-0 opacity-0 cursor-pointer w-full h-full z-10">
                        <option value="+91" data-flag="🇮🇳">+91</option>
                        <option value="+971" data-flag="🇦🇪">+971</option>
                        <option value="+966" data-flag="🇸🇦">+966</option>
                        <option value="+1" data-flag="🇺🇸">+1</option>
                        <option value="+44" data-flag="🇬🇧">+44</option>
                    </select>
                </div>
                <div class="flex-1 bg-[#1a1a1a] border border-white/5 rounded-2xl focus-within:border-primary-container/50 focus-within:ring-1 focus-within:ring-primary-container/50 transition-all relative">
                    <input id="userPhone" required class="w-full bg-transparent py-4 px-4 text-white placeholder-[#555] focus:outline-none font-medium" placeholder="98765 43210" type="tel"/>
                </div>
            </div>
        </div>

        <button class="w-full py-4 mt-8 bg-white text-black rounded-2xl font-bold text-lg hover:bg-primary-container hover:shadow-[0_0_30px_rgba(0,255,136,0.4)] transition-all duration-300 transform active:scale-[0.98] flex items-center justify-center gap-2" type="submit">
            Initialize
            <span class="material-symbols-outlined text-xl">arrow_right_alt</span>
        </button>
    </form>
</main>

<script>
    document.getElementById('countryCode').addEventListener('change', function(e) {
        const selectedOption = e.target.options[e.target.selectedIndex];
        document.getElementById('flagIcon').textContent = selectedOption.getAttribute('data-flag');
        document.getElementById('codeText').textContent = selectedOption.value;
    });

    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const name = document.getElementById('userName').value.trim();
        const code = document.getElementById('countryCode').value;
        const phoneInput = document.getElementById('userPhone').value.trim();
        const phone = code + ' ' + phoneInput;

        if (name && phoneInput) {
            // Save to localStorage
            const data = {
                name: name,
                phone: phone
            };
            localStorage.setItem('onboarding_data', JSON.stringify(data));
            
            // Redirect to step 1
            window.location.href = 'step1.html';
        } else {
            if(typeof showToast === 'function') {
                showToast("Please provide both your name and phone number to continue.");
            }
        }
    });
</script>

<div id="toast-container" class="fixed top-6 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-2 transition-all pointer-events-none"></div>
<script>
function showToast(message, type = 'error') {
    const container = document.getElementById('toast-container');
    if (!container) return;
    const toast = document.createElement('div');
    const isError = type === 'error';
    const bg = isError ? 'bg-red-500/10 border-red-500/50 text-red-400' : 'bg-primary-container/10 border-primary-container/50 text-primary-container';
    const icon = isError ? 'error' : 'check_circle';
    
    toast.className = `flex items-center gap-3 px-6 py-4 rounded-2xl border backdrop-blur-md shadow-2xl transform transition-all duration-300 translate-y-[-100%] opacity-0 ${bg}`;
    toast.innerHTML = `<span class="material-symbols-outlined">${icon}</span><p class="font-bold text-sm">${message}</p>`;
    
    container.appendChild(toast);
    
    // Animate in
    requestAnimationFrame(() => {
        toast.classList.remove('translate-y-[-100%]', 'opacity-0');
    });
    
    // Auto remove
    setTimeout(() => {
        toast.classList.add('opacity-0', 'scale-95');
        setTimeout(() => toast.remove(), 300);
    }, 4000);
}
</script>
\n</body>
</html>
