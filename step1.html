<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Onboarding - Identity</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@700;800&amp;family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-fixed": "#60ff99",
              "surface-container-high": "#2a2a2a",
              "on-surface-variant": "#b9cbb9",
              "on-secondary-fixed-variant": "#005228",
              "on-error-container": "#ffdad6",
              "surface-container-lowest": "#0e0e0e",
              "inverse-surface": "#e5e2e1",
              "surface-dim": "#131313",
              "surface-container-highest": "#353534",
              "primary": "#f1ffef",
              "surface-bright": "#3a3939",
              "on-background": "#e5e2e1",
              "secondary-container": "#027038",
              "primary-container": "#00ff88",
              "error": "#ffb4ab",
              "secondary-fixed": "#9af7b0",
              "secondary": "#7eda96",
              "surface": "#131313",
              "surface-variant": "#353534",
              "tertiary-fixed-dim": "#e5c364",
              "on-primary-fixed-variant": "#005228",
              "primary-fixed-dim": "#00e479",
              "on-primary-container": "#007139",
              "outline-variant": "#3b4b3d",
              "on-secondary-fixed": "#00210c",
              "tertiary-fixed": "#ffe08d",
              "on-primary": "#003919",
              "on-tertiary": "#3d2f00",
              "on-error": "#690005",
              "error-container": "#93000a",
              "inverse-on-surface": "#313030",
              "on-secondary": "#003919",
              "on-secondary-container": "#94f0ab",
              "surface-container": "#201f1f",
              "tertiary-container": "#ffdb79",
              "on-surface": "#e5e2e1",
              "on-tertiary-fixed-variant": "#584400",
              "outline": "#849585",
              "on-tertiary-fixed": "#241a00",
              "surface-tint": "#00e479",
              "secondary-fixed-dim": "#7eda96",
              "surface-container-low": "#1c1b1b",
              "background": "#131313",
              "inverse-primary": "#006d37",
              "on-primary-fixed": "#00210c",
              "tertiary": "#fffaf7",
              "on-tertiary-container": "#795f01"
            },
            fontFamily: {
              "headline": ["Epilogue"],
              "body": ["Manrope"],
              "label": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #0e0e0e; /* surface-container-lowest */
            color: #e5e2e1;
            font-family: 'Manrope', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
      background-color: #0e0e0e;
    }
  </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col overflow-x-hidden" data-mode="connect">
<!-- TopAppBar - Applied style from SCREEN_78 -->
<header class="bg-[#131313] docked full-width top-0 z-50 bg-[#0e0e0e] shadow-[0_48px_48px_-12px_rgba(14,14,14,0.6)]">
<div class="flex items-center justify-between w-full px-6 h-14 max-w-none"><button class="text-[#00ff88] hover:bg-[#2a2a2a] transition-colors duration-300 scale-95 active:scale-90 transition-transform p-2 rounded-full">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="flex flex-col items-center">
<h1 class="font-headline font-bold text-white tracking-tight text-sm uppercase opacity-60 mb-1">Onboarding</h1>
<div class="flex items-center gap-1.5">
<div class="h-1 w-3 rounded-full bg-[#00ff88] shadow-[0_0_8px_rgba(0,255,136,0.6)]"></div>
<div class="h-1 w-1 rounded-full bg-[#00ff88]/30"></div>
<div class="h-1 w-1 rounded-full bg-[#00ff88]/30"></div>
<div class="h-1 w-1 rounded-full bg-[#00ff88]/30"></div>
</div>
</div>
<div class="flex items-center">
<span class="text-[#00ff88] font-headline font-bold text-xs tracking-wider uppercase">Step 01 of 4</span>
</div></div>
</header>
<main class="flex-1 flex flex-col px-6 pb-32 max-w-2xl mx-auto w-full pt-12">
<!-- Progress Section -->
<!-- Hero Section -->
<section class="mb-12">
<h2 class="font-headline text-4xl md:text-5xl text-on-surface leading-tight mb-4">Let's build your clone</h2>
<p class="font-body text-on-surface-variant text-lg leading-relaxed max-w-md">
                Tell us who you are so we can write exactly like you.
            </p>
</section>
<!-- Form Section -->
<div class="space-y-10">
<!-- Input Group: Identity -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="space-y-2">
<label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider ml-1">Full Name</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant/10 focus:border-primary-fixed-dim focus:ring-1 focus:ring-primary-fixed-dim/20 rounded-lg py-4 px-5 text-on-surface transition-all outline-none" placeholder="e.g. Alexander Vance" type="text" id="fullName"/>
</div>
<div class="space-y-2">
<label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider ml-1">Role/Title</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant/10 focus:border-primary-fixed-dim focus:ring-1 focus:ring-primary-fixed-dim/20 rounded-lg py-4 px-5 text-on-surface transition-all outline-none" placeholder="e.g. CEO &amp; Founder" type="text" id="roleTitle"/>
</div>
</div>
<!-- Input Group: Context -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="space-y-2">
<label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider ml-1">Company Name</label>
<input id="companyName" class="w-full bg-surface-container-lowest border border-outline-variant/10 focus:border-primary-fixed-dim focus:ring-1 focus:ring-primary-fixed-dim/20 rounded-lg py-4 px-5 text-on-surface transition-all outline-none" placeholder="e.g. Obsidian AI" type="text"/>
</div>
<div class="space-y-2">
<label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider ml-1">Industry</label>
<div class="relative">
<select id="industrySelect" class="w-full bg-surface-container-lowest border border-outline-variant/10 focus:border-primary-fixed-dim focus:ring-1 focus:ring-primary-fixed-dim/20 rounded-lg py-4 px-5 text-on-surface appearance-none transition-all outline-none">
<option>Venture Capital</option>
<option>SaaS &amp; Tech</option>
<option>Fintech</option>
<option>HealthTech</option>
<option>E-commerce</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">expand_more</span>
</div>
</div>
</div>
<!-- Textarea: Audience -->
<div class="space-y-2">
<label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider ml-1">Target Audience</label>
<textarea id="targetAudience" class="w-full bg-surface-container-lowest border border-outline-variant/10 focus:border-primary-fixed-dim focus:ring-1 focus:ring-primary-fixed-dim/20 rounded-lg py-4 px-5 text-on-surface transition-all outline-none resize-none" placeholder="Who are you speaking to? (e.g. Seed-stage founders looking for scale...)" rows="3"></textarea>
</div>
<!-- Multi-select: Goals -->
<div class="space-y-4">
<label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider ml-1">LinkedIn Goal</label>
<div class="flex flex-wrap gap-3" id="linkedinGoalBtns">
<button class="px-5 py-2.5 rounded-full bg-primary-container text-on-primary font-bold text-sm transition-all shadow-[0_4px_14px_rgba(0,255,136,0.3)]">Thought Leadership</button>
<button class="px-5 py-2.5 rounded-full bg-surface-container-high text-on-surface-variant border border-outline-variant/20 font-bold text-sm transition-all hover:bg-primary-container/10">Lead Generation</button>
<button class="px-5 py-2.5 rounded-full bg-surface-container-high text-on-surface-variant border border-outline-variant/20 font-bold text-sm transition-all hover:bg-primary-container/10">Hiring</button>
<button class="px-5 py-2.5 rounded-full bg-surface-container-high text-on-surface-variant border border-outline-variant/20 font-bold text-sm transition-all hover:bg-primary-container/10">Personal Brand Building</button>
<button class="px-5 py-2.5 rounded-full bg-surface-container-high text-on-surface-variant border border-outline-variant/20 font-bold text-sm transition-all hover:bg-primary-container/10">Business Goals</button>
</div>
</div>
</div>
<!-- CTA Action -->
<div class="mt-16 mb-8">
<button onclick="saveStep1AndProceed()" class="group w-full md:w-fit md:min-w-[240px] bg-primary-container text-on-primary py-5 px-8 rounded-lg font-bold text-lg flex items-center justify-center gap-3 shadow-[0_20px_40px_-12px_rgba(0,255,136,0.3)] hover:glow-[#00e479]/20 transition-all duration-300">
                Continue
                <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</main>
<!-- BottomNavBar as Progress Indicator -->
<nav class="fixed bottom-10 left-1/2 -translate-x-1/2 flex items-center h-8 px-4 bg-[#0e0e0e]/60 backdrop-blur-xl border border-white/5 rounded-full z-50 shadow-2xl transition-all duration-500 ease-out">
<div class="flex items-center gap-4">
<div onclick="window.location.href='step1.html'" class="w-2.5 h-2.5 rounded-full bg-primary-container shadow-[0_0_12px_rgba(0,255,136,0.6)] cursor-pointer hover:scale-150 transition-transform"></div>
<div onclick="window.location.href='step2.html'" class="w-2 h-2 rounded-full border border-on-surface-variant/30 cursor-pointer hover:scale-150 hover:bg-white/20 transition-all"></div>
<div onclick="window.location.href='step3.html'" class="w-2 h-2 rounded-full border border-on-surface-variant/30 cursor-pointer hover:scale-150 hover:bg-white/20 transition-all"></div>
<div onclick="window.location.href='step4.html'" class="w-2 h-2 rounded-full border border-on-surface-variant/30 cursor-pointer hover:scale-150 hover:bg-white/20 transition-all"></div>
</div>
</nav>

<script>
  const lgContainer = document.getElementById('linkedinGoalBtns');
  if(lgContainer) {
    const lgBtns = lgContainer.querySelectorAll('button');
    const activeClasses = ['bg-primary-container', 'text-on-primary', 'shadow-[0_4px_14px_rgba(0,255,136,0.3)]'];
    const inactiveClasses = ['bg-surface-container-high', 'text-on-surface-variant', 'border', 'border-outline-variant/20', 'hover:bg-primary-container/10'];
    
    lgBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        lgBtns.forEach(b => {
          b.classList.remove(...activeClasses);
          b.classList.add(...inactiveClasses);
        });
        btn.classList.remove(...inactiveClasses);
        btn.classList.add(...activeClasses);
      });
    });
  }

  function saveStep1AndProceed() {
      const data = JSON.parse(localStorage.getItem('onboarding_data') || '{}');
      data.fullName = document.getElementById('fullName')?.value || '';
      data.roleTitle = document.getElementById('roleTitle')?.value || '';
      data.companyName = document.getElementById('companyName')?.value || '';
      data.industry = document.getElementById('industrySelect')?.value || '';
      data.targetAudience = document.getElementById('targetAudience')?.value || '';
      
      const activeBtn = document.querySelector('#linkedinGoalBtns button.bg-primary-container');
      data.linkedinGoal = activeBtn ? activeBtn.innerText : '';

      localStorage.setItem('onboarding_data', JSON.stringify(data));
      window.location.href = 'step2.html';
  }
</script>
</body></html>
